<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lector QR</title>
</head>
<body>
    <h1>Lector de Códigos QR</h1>
    
    <!-- Aquí se muestra la cámara -->
    <div id="lector-qr"></div>
    
    <p>Resultado: <span id="resultado">Esperando QR...</span></p>
    
    <button onclick="iniciarEscaneo()">Iniciar Cámara</button>
    <button onclick="detenerEscaneo()">Detener Cámara</button>
    <button onclick="limpiarhistorial()">limpiar historal</button>

    <h3>Historial de Códigos Escaneados</h3>
    <table id="tabla-historica">
        <thead>
            <tr>
                <th>#</th>
                <th>Contenido Qr</th>
                <th>Hora</th>
            </tr>
        </thead>
        <tbody id="cuerpo-tabla"></tbody>
    </table>


    <!-- Librería pa' leer QR. Va primero -->
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <!-- Tu archivo JS. Va después -->
    <script src="script.js"></script>
</body>
</html>
